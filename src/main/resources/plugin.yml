name: EnthusiaCommend
main: org.enthusia.rep.CommendPlugin
version: 2.11.1
api-version: '1.21'
author: Enthusia
depend: [Vault]
softdepend: [PlaceholderAPI, EnthusiaTeleport, ProtocolLib, WarzoneDuels, Plan]

commands:
  rep:
    description: View and manage reputation.
    aliases: [reputation]
    usage: /rep
    permission: enthusiacommend.rep.view

permissions:
  enthusiacommend.*:
    description: All EnthusiaCommend permissions.
    default: false
    children:
      enthusiacommend.rep.*: true

  enthusiacommend.rep.*:
    description: All rep-related permissions.
    default: false
    children:
      enthusiacommend.rep.view: true
      enthusiacommend.rep.admin: true
      enthusiacommend.rep.stalk: true
      enthusiacommend.rep.alert: true
      enthusiacommend.rep.testpay: true

  enthusiacommend.rep.view:
    description: Use /rep to view reputation.
    default: true

  enthusiacommend.rep.admin:
    description: Admin functions for rep (/rep admin ...).
    default: op
    children:
      enthusiacommend.rep.alert: true

  enthusiacommend.rep.stalk:
    description: Use /rep stalk.
    default: true

  enthusiacommend.rep.alert:
    description: Receive alerts for suspicious rep activity.
    default: op

  enthusiacommend.rep.testpay:
    description: Reserved for economy test hooks.
    default: op
